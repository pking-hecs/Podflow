version: "3.8"

services:

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8080:8080"
    environment:
      - USER_SERVICE_URL=http://backend:5000
    networks:
      - public_net
      - service_net

  user-service:
    build: ./services/user-service
    networks:
      - service_net

  backend:
    build: ./services/backend
    ports:
      - "5000:5000"
    networks:
      - service_net

  prometheus:
    image: docker.io/prom/prometheus
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - service_net

grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - service_net


networks:
  public_net:
    driver: bridge

  service_net:
    driver: bridge